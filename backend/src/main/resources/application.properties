server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/smartlife_db
spring.data.mongodb.database=smartlife_db

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# AI Configuration (optional - set your API key here)
app.ai.api-key=${OPENAI_API_KEY:mock}
app.ai.enabled=false

# Logging
logging.level.com.smartlife=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# Disable Spring Security default password generation
spring.security.user.password=disabled
